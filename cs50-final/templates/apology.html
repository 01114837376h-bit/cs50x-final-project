{% extends "layout.html" %}

{% block title %}Oops{% endblock %}

{% block main %}
<div class="container text-center py-5">
    
    <img 
        src="https://img.freepik.com/free-vector/404-error-with-a-cute-animal-concept-illustration_114360-1811.jpg" 
        alt="Error illustration" 
        class="img-fluid mb-4"
        style="max-width: 300px;">

    <h1 class="mb-2">Something went wrong</h1>

    <p class="text-muted mb-1">Error {{ code }}</p>
    <p class="mb-4">{{ message }}</p>

    <button 
        class="btn btn-outline-secondary" 
        onclick="window.history.back()">
        Go back
    </button>

</div>
{% endblock %}
